    <style>
      body {
        user-select: none;
      }

      input,
      textarea {
        user-select: text;
      }

  <body oncontextmenu="return false;">
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Smart key control (allow inside input/textarea)
      document.addEventListener('keydown', function (e) {
        const tag = document.activeElement.tagName.toLowerCase();

        if (tag === 'input' || tag === 'textarea') return;

        if (
          (e.ctrlKey && ['c', 'u', 's', 'x', 'v'].includes(e.key.toLowerCase())) ||
          e.key === 'F12'
        ) {
          e.preventDefault();
        }
      });

      // Console Warning
      console.log('%cStop!', 'color: red; font-size: 50px; font-weight: bold;');

      console.log(
        '%cThis is a browser feature intended for developers. If someone told you to paste code here, it may be a scam.',
        'font-size: 16px; color: white; background-color: black; padding: 5px;'
      );

      console.log(
        'See %chttps://t.me/BlueOrbitDevs%c for more information.',
        'color: blue; text-decoration: underline;',
        ''
      );

      // ASCII Logo
      console.log(`%c
      ...:::::::::::::::::::...      
 ....+*#######################*=...  
...=############################*:...
..-###############################:..

..#########=.*#########=.*########=..

..*###############################=..
..-###############################:..
...-*###########################*:...
.....=*#######################*-.....
......::::-----------------::::......

           NoteNDo
`,
        "font-family: monospace; font-size: 10px; line-height: 1; color: #00ffcc;"
      );

      // DevTools Detection (basic)
      (function () {
        const devtools = /./;
        devtools.toString = function () {
          this.opened = true;
        };

        const check = new Function('debugger;');

        setInterval(function () {
          const wasOpened = devtools.opened;
          devtools.opened = false;
          check();

          if (devtools.opened || wasOpened) {
            console.clear();
            console.log('%cDeveloper tools detected.', 'color: red; font-size: 16px;');
          }
        }, 1000);
      })();
    </script>
  </body>
